<!DOCTYPE html>
<html lang="ja" data-i18n-title="help.title">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Tool — Help</title>
<script src="i18n.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-panel: #14141c;
    --bg-panel2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #888899;
    --accent: #00e5ff;
    --note: #ffcc00;
    --judgment: #ff3366;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.7;
  }

  .top-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 24px; background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .top-bar h1 {
    font-size: 13px; font-weight: 700; letter-spacing: 0.15em;
    color: var(--accent); text-transform: uppercase;
  }
  .nav-links { display: flex; gap: 8px; margin-left: auto; }
  .nav-link {
    color: var(--text-dim); font-size: 11px; letter-spacing: 0.1em;
    text-decoration: none; border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 2px;
    font-weight: 600; text-transform: uppercase;
    transition: color 0.12s, border-color 0.12s;
  }
  .nav-link:hover { color: var(--accent); border-color: var(--accent); }

  .content {
    max-width: 820px; margin: 0 auto; padding: 48px 24px 80px;
  }

  h2 {
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent);
    margin-top: 48px; margin-bottom: 16px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  h2:first-child { margin-top: 0; }

  h3 {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim);
    margin-top: 28px; margin-bottom: 10px;
  }

  p { color: var(--text-dim); margin-bottom: 10px; }
  p strong { color: var(--text); font-weight: 600; }

  /* Shortcut table */
  .shortcut-table {
    width: 100%; border-collapse: collapse; margin-bottom: 8px;
  }
  .shortcut-table tr { border-bottom: 1px solid var(--border); }
  .shortcut-table tr:last-child { border-bottom: none; }
  .shortcut-table td {
    padding: 8px 12px; vertical-align: top;
  }
  .shortcut-table td:first-child { width: 200px; }

  kbd {
    display: inline-block;
    background: var(--bg-panel2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .desc { color: var(--text-dim); }

  /* Workflow steps */
  .steps { counter-reset: step; list-style: none; }
  .steps li {
    counter-increment: step;
    display: flex; gap: 16px; align-items: flex-start;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .steps li:last-child { border-bottom: none; }
  .step-num {
    flex-shrink: 0; width: 24px; height: 24px;
    background: var(--bg-panel2); border: 1px solid var(--border);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--accent);
  }
  .step-body {}
  .step-title { color: var(--text); font-weight: 700; margin-bottom: 4px; }
  .step-detail { color: var(--text-dim); }

  /* Callout */
  .callout {
    background: var(--bg-panel2); border-left: 3px solid var(--accent);
    padding: 12px 16px; margin: 16px 0; border-radius: 0 2px 2px 0;
  }
  .callout.warn { border-left-color: var(--note); }
  .callout p { margin: 0; }
  .callout p + p { margin-top: 8px; }

  /* Inline badge */
  .badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 2px;
  }
  .badge-player { background: rgba(255,51,102,0.15); color: var(--judgment); border: 1px solid rgba(255,51,102,0.3); }
  .badge-editor { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.3); }

  hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
</style>
</head>
